<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200">
  <title>PayGate OG Image</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 100px;
    }

    .wordmark {
      font-size: 1.25rem;
      font-weight: 700;
      color: #3fb950;
      letter-spacing: 0.05em;
      text-transform: lowercase;
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .wordmark img {
      height: 64px;
      width: auto;
    }

    h1 {
      font-size: 3.25rem;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.03em;
      color: #e6edf3;
      margin-bottom: 48px;
      max-width: 900px;
    }

    .stats {
      display: flex;
      gap: 64px;
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      color: #3fb950;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 0.85rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .border-accent {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: #3fb950;
    }
  </style>
</head>
<body>
  <div class="border-accent"></div>
  <div class="wordmark"><img src="logo.svg" alt="">paygate</div>
  <h1>Give your agent $1.<br>Watch it buy its own tools.</h1>
  <div class="stats">
    <div>
      <div class="stat-number">$0.002</div>
      <div class="stat-label">per request</div>
    </div>
    <div>
      <div class="stat-number">0.4s</div>
      <div class="stat-label">payment finality</div>
    </div>
    <div>
      <div class="stat-number">0</div>
      <div class="stat-label">API keys needed</div>
    </div>
  </div>
</body>
</html>
