<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    PayGate favicon: $→ mark on dark background
    Scaled from 40x40 logo to fit 32x32 with padding.
  -->
  <rect width="32" height="32" rx="6" fill="#0d1117"/>
  <!-- $ vertical bar -->
  <line x1="9" y1="6" x2="9" y2="26" stroke="#e6edf3" stroke-width="2.2" stroke-linecap="round"/>
  <!-- $ top arc -->
  <path d="M14 9 C11 7.5, 4 8.5, 4 12 C4 15.5, 14 15.5, 14 15.5" stroke="#e6edf3" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- $ bottom arc -->
  <path d="M4 17 C4 17, 14 17, 14 20.5 C14 24, 7 25, 4 23.5" stroke="#e6edf3" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Arrow -->
  <line x1="15.5" y1="16.25" x2="27" y2="16.25" stroke="#3fb950" stroke-width="2.2" stroke-linecap="round"/>
  <polyline points="24,12.5 28,16.25 24,20" stroke="#3fb950" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
